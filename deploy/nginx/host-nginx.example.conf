## Пример конфига Nginx на ХОСТЕ (вне Docker), который терминирует SSL и
## проксирует на Kong (порт 8000) и фронтенд (порт 8080).
## Файл: /etc/nginx/sites-available/fix-logistics → симлинк в sites-enabled
## SSL: certbot --nginx -d app.example.ru -d api.example.ru

# === Фронтенд ===
server {
    listen 80;
    server_name app.example.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.example.ru;

    ssl_certificate     /etc/letsencrypt/live/app.example.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.example.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 60m;     # docs/avatars upload

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# === API (Kong → Supabase-стек) ===
server {
    listen 80;
    server_name api.example.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.example.ru;

    ssl_certificate     /etc/letsencrypt/live/api.example.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 60m;
    proxy_read_timeout 300s;
    proxy_buffering off;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket для Realtime
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
